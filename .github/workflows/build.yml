name: Build

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Gradle
        run: |
          chmod +x ./gradlew
          ./gradlew build --no-daemon

      - name: Upload plugin jars
        uses: actions/upload-artifact@v4
        with:
          name: FreshwaterBanX-plugins
          path: |
            velocity/build/libs/FreshwaterBanX-*.jar
            velocity-relay/build/libs/FreshwaterBanX-VelocityRelay-*.jar
            bridge/build/libs/FreshwaterBanX-Bridge-*.jar
            waterfall/build/libs/FreshwaterBanX-Waterfall-*.jar
          if-no-files-found: error
